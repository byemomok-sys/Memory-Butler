<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Butler - 기억집사</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#0f131a">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" href="icon.png">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="glass-widget">
                <div class="widget-title-zone">
                    <span class="pulse-icon"></span>
                    <h2>Memory Butler</h2>
                </div>
                <form id="recordForm" onsubmit="handleRecordSubmit(event)">
                    <div class="search-bar-wrap">
                        <input type="text" id="locationInput" placeholder="어디에 무엇을 두셨나요?" autocomplete="off" required>
                        <button type="submit" class="submit-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                        </button>
                    </div>
                </form>
                <div class="widget-status">입력 즉시 입력 폼이 비워지며 백그라운드 AI 연동이 시작됩니다.</div>
            </div>
        </header>

        <main class="app-main">
            <div class="section-header">
                <h3>📍 자가 학습 공간 리스트</h3>
                <span class="total-count">보관 물품 0개</span>
            </div>
            <div class="space-grid" id="spaceContainer">
                </div>
        </main>
    </div>

    <div id="notificationToast" class="toast hidden">
        <div class="toast-content">
            <div class="toast-loader"></div>
            <span id="toastMessage"></span>
        </div>
        <button onclick="editMode()" class="toast-edit-btn">수정</button>
    </div>

    <script>
        // PWA 모바일 로컬 설치 구동용 서비스 워커 핸들러 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('기억집사 서비스워커 정상 바인딩 완료'))
                .catch(err => console.log('서비스워커 등록 오류:', err));
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
